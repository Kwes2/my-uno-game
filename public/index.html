<!DOCTYPE html>
<html>
<head>
    <title>Simple Uno</title>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <h1>Uno Room Test</h1>
    <div id="room-controls">
        <input type="text" id="roomInput" placeholder="Enter Room Name">
        <button onclick="join()">Join Room</button>
    </div>

    <div id="game-area" style="display:none;">
        <h2 id="status"></h2>
        <div id="my-cards"></div>
        <button onclick="playCard()">Play a Card</button>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";

        function join() {
            currentRoom = document.getElementById('roomInput').value;
            socket.emit('joinRoom', currentRoom);
            document.getElementById('room-controls').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
        }

        socket.on('gameState', (data) => {
            const currentPlayer = data.players[data.turn];
            document.getElementById('status').innerText = "Current Turn: " + currentPlayer.name;
        });

        function playCard() {
            socket.emit('playCard', { roomId: currentRoom });
        }
    </script>
</body>
</html>
